<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Code Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div>
            <h1>Online Code Editor</h1>
        </div>
        <button id="saveBtn">Salveaza proiectul</button>
    </header>

    <main class="workspace">
        <section class="editor-container" aria-label="Editoare de cod">
            <div class="panel-title">
                <span>Editor</span>
                <small>HTML, CSS si JavaScript</small>
            </div>

            <div class="editor">
                <h2>HTML</h2>
                <textarea id="htmlCode" spellcheck="false">&lt;h1&gt;Salut!&lt;/h1&gt;</textarea>
            </div>

            <div class="editor">
                <h2>CSS</h2>
                <textarea id="cssCode" spellcheck="false">h1 { color: red; }</textarea>
            </div>

            <div class="editor">
                <h2>JavaScript</h2>
                <textarea id="jsCode" spellcheck="false">console.log("Salut din JS!");</textarea>
            </div>
        </section>

        <section class="result-container" aria-label="Rezultat live">
            <div class="panel-title">
                <span>Rezultat</span>
                <small>Preview live</small>
            </div>
            <iframe id="output" title="Rezultat cod"></iframe>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
